name: Daily Auto Commit

on:
  schedule:
    - cron: '30 4 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Step for 23f1000789@ds.study.iitm.ac.in
        run: echo "Last updated at $(date)" > daily-log.txt

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "23f1000789@ds.study.iitm.ac.in"
          git add daily-log.txt
          git commit -m "Daily automated commit on $(date)"
          git push
